name: Build, Test and Release VSIX

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run Unit Tests
        run: npm run test:unit
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            .mocha-output
          retention-days: 7

  build:
    name: Build VSIX and Create Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run Unit Tests (double check)
        run: npm run test:unit

      - name: Install VSCE
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        run: |
          PACKAGE_NAME="byte-bit-tool-${{ github.ref_name }}.vsix"
          vsce package --out $PACKAGE_NAME
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PACKAGE_NAME }}
          name: ${{ github.ref_name }}
          body: |
            ## Byte Bit Tool ${{ github.ref_name }}

            ### Tests Passed
            All unit tests have been successfully completed before this release.

            ### Installation
            1. Download `${{ env.PACKAGE_NAME }}`
            2. In VS Code, go to Extensions (Ctrl+Shift+X)
            3. Click "..." menu -> "Install from VSIX..."
            4. Select the downloaded file

            ### Or install via command line
            ```bash
            code --install-extension ${{ env.PACKAGE_NAME }}
            ```