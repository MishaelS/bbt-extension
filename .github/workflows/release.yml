name: Build, Test and Release VSIX

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run Unit Tests
        run: npm run test:unit
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            .mocha-output
          retention-days: 7

  build:
    name: Build VSIX and Create Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run Unit Tests (double check)
        run: npm run test:unit

      - name: Install VSCE
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        run: |
          PACKAGE_NAME="byte-bit-tool-${{ github.ref_name }}.vsix"
          vsce package --out $PACKAGE_NAME
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Extract release notes from CHANGELOG.md
        id: extract_notes
        run: |
          VERSION="${{ github.ref_name }}"
          # Remove 'v' prefix if present
          VERSION_CLEAN="${VERSION#v}"

          echo "Extracting notes for version $VERSION_CLEAN"

          # Extract the section between ## [$VERSION_CLEAN] and the next ##
          awk -v ver="$VERSION_CLEAN" '
            BEGIN { found=0; print_started=0 }
            /^## \[/ && found==0 {
              if ($0 ~ ver) {
                found=1
                next
              }
            }
            found==1 && !print_started {
              # Skip the version header line itself
              if ($0 ~ /^## \[/) {
                next
              }
              print_started=1
            }
            found==1 && print_started==1 {
              if ($0 ~ /^## \[/) {
                exit
              }
              print
            }
          ' CHANGELOG.md > release_notes.md

          # If no notes found, use a fallback
          if [ ! -s release_notes.md ]; then
            echo "No release notes found for version $VERSION_CLEAN, using fallback" > release_notes.md
            echo "" >> release_notes.md
            echo "### Installation" >> release_notes.md
            echo "1. Download \`${{ env.PACKAGE_NAME }}\`" >> release_notes.md
            echo "2. In VS Code, go to Extensions (Ctrl+Shift+X)" >> release_notes.md
            echo "3. Click \"...\" menu -> \"Install from VSIX...\"" >> release_notes.md
            echo "4. Select the downloaded file" >> release_notes.md
          fi

          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Also save as file for artifact
          echo "Release notes extracted:"
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PACKAGE_NAME }}
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.extract_notes.outputs.release_notes }}

            ---

            ## Installation

            1. Download `${{ env.PACKAGE_NAME }}`
            2. In VS Code, go to Extensions (Ctrl+Shift+X)
            3. Click "..." menu → "Install from VSIX..."
            4. Select the downloaded file

            ### Or install via command line
            ```bash
            code --install-extension ${{ env.PACKAGE_NAME }}
            ```